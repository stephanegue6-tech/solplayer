[alembic]
script_location = migrations
prepend_sys_path = .

# Laissé vide volontairement : l'URL réelle est injectée dynamiquement par
# migrations/env.py à partir de DATABASE_URL (variable d'environnement /
# .env), pour ne pas dupliquer la config entre alembic.ini et app/database.py.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
